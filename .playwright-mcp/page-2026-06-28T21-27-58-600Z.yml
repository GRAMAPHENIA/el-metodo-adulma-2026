      - article [ref=e71]:
        - paragraph [ref=e73]: Hace más de 25 años adultos mayores toman clases con EL MÉTODO ADULMA® donde se realiza un trabajo de investigación siempre consultando grupos de trabajo interdisciplinario de médicos clínicos, cardiólogos, gerontólogos, neurólogos, psiquiatras, psicólogos, kinesiólogos, profesores de educación física, nutricionistas, siempre actualizado, porque EL MÉTODO ADULMA® no espera épocas mejores, EL MÉTODO ADULMA® hace mejores las épocas.
