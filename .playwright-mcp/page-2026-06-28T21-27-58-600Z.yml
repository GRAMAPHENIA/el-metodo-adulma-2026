    - generic [ref=e33]:
      - generic [ref=e34]:
        - paragraph [ref=e35]: El Método
        - heading "El Método Adulma" [level=2] [ref=e36]
        - paragraph [ref=e37]: Conocé por qué este enfoque transforma tanto la enseñanza profesional como la práctica cotidiana en adultos mayores.
      - generic [ref=e38]:
        - generic [ref=e39]:
          - heading "¿Por qué enseñar El Método?" [level=3] [ref=e40]
          - article [ref=e41]:
            - paragraph [ref=e43]: Porque EL MÉTODO ADULMA®, creado en el año 2004, es un conjunto de elementos, actividades, temas y asuntos, que competen a los adultos mayores, para que proyectos, ideas y ganas de vivir la vida, puedan llevarlos a cabo todos y cada uno cuando está bien enseñado.
          - article [ref=e44]:
            - paragraph [ref=e46]: EL MÉTODO ADULMA® apuesta a sus capacidades, sin subestimar aptitudes, virtudes y cualidades, desafiándolos siempre a ir por más, como la gente real de las imágenes de esta web, todos ellos practican EL MÉTODO ADULMA®.
        - generic [ref=e47]:
          - heading "¿Por qué aprender El Método?" [level=3] [ref=e48]
          - article [ref=e49]:
            - paragraph [ref=e51]: Porque EL MÉTODO ADULMA® recupera habilidades perdidas, enlentecidas, mentes desorientadas, cuerpos rígidos y todo lo que el Adulto Mayor comienza a experimentar avanzado el paso de los años. Entonces, ¿la prevención en la vejez es factible? ¡Sí, y podemos estar preparados y tener una vejez saludable e independiente.
          - article [ref=e52]:
            - paragraph [ref=e54]: "El cuestionamiento debería ser: ¿cómo quiero vivir esta etapa? La salud física, mental y social son la clave. EL MÉTODO ADULMA® te enseña todo tipo de tips para tu salud integral. Solo debés probarlo, sentirlo y luego comparar cómo estabas antes de practicarlo. Que no te lo cuenten, experiméntalo vos mismo."
